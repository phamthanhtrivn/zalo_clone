server {
    listen 80;
    server_name zola14.ddns.net;
    
    # Ép tất cả request HTTP thường phải nhảy sang HTTPS bảo mật
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name zola14.ddns.net;

    ssl_certificate     /etc/letsencrypt/live/zola14.ddns.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zola14.ddns.net/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;

    # SPA fallback: tất cả route không tìm thấy file thì trả về index.html
    location / {
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://zalo-backend:3000; # "zalo-backend" là tên service trong docker-compose
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    location /socket.io/ {
        proxy_pass http://zalo-backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade"; # Bắt buộc để giữ mạch WebSocket
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|mp3)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}