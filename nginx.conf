worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # -------------------------------------------------------
    # Logging
    # -------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 50M;

    # -------------------------------------------------------
    # Gzip compression
    # -------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json
               application/javascript application/rss+xml
               application/atom+xml image/svg+xml;

    # -------------------------------------------------------
    # Upstream definitions
    # -------------------------------------------------------
    upstream backend {
        server backend:3000;   # Docker service name "backend"
        keepalive 32;
    }

    # -------------------------------------------------------
    # HTTP server (redirect to HTTPS if SSL is enabled later)
    # Remove this block and uncomment the HTTPS block below
    # when you have an SSL certificate.
    # -------------------------------------------------------
    server {
        listen 80;
        server_name _;   # Replace with your domain, e.g. zola.example.com

        # ── REST API ──────────────────────────────────────────
        location /api/ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_read_timeout  120s;
            proxy_send_timeout  120s;
            proxy_connect_timeout 10s;
        }

        # ── WebSocket (Socket.IO) ─────────────────────────────
        # NestJS Gateway is mounted at /socket.io by default
        location /socket.io/ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;

            # Required for WebSocket upgrade
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_read_timeout  3600s;   # Keep WS connections alive (1 hour)
            proxy_send_timeout  3600s;
        }

        # ── React / Vite SPA (served by the "web" container) ──
        # If the web container already serves on :80 you can remove
        # this block and let the web container handle it directly.
        # Uncomment the block below only when Nginx is the sole
        # entry-point (i.e. web container exposes port internally).
        #
        # location / {
        #     root  /usr/share/nginx/html;
        #     index index.html;
        #     try_files $uri $uri/ /index.html;   # SPA fallback
        #
        #     # Cache static assets aggressively
        #     location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        #         expires 1y;
        #         add_header Cache-Control "public, immutable";
        #     }
        # }

        # Serve the web container as a reverse proxy (current setup)
        location / {
            proxy_pass         http://web:80;   # Docker service name "web"
            proxy_http_version 1.1;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }

    # -------------------------------------------------------
    # HTTPS server — uncomment when you have a cert
    # (e.g. via Certbot / Let's Encrypt on the EC2 instance)
    # -------------------------------------------------------
    # server {
    #     listen 443 ssl http2;
    #     server_name zola.example.com;
    #
    #     ssl_certificate     /etc/letsencrypt/live/zola.example.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/zola.example.com/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #     ssl_session_cache   shared:SSL:10m;
    #
    #     # ... same location blocks as above ...
    # }
    #
    # Redirect HTTP → HTTPS
    # server {
    #     listen 80;
    #     server_name zola.example.com;
    #     return 301 https://$host$request_uri;
    # }
}
